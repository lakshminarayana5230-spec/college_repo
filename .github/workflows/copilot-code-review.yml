name: AI Code Review (Copilot)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened	
    branches:
      - main	

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest

    steps:
      - name: Run Copilot Review
        uses: actions/checkout@v4        
      - name: CodeRabbit AI Review
        uses: coderabbitai/ai-pr-reviewer@latest

        with:
          review_level: full
          prompt: |
            Perform a senior-level code review.
            Identify bugs, security issues, performance problems,
            backward compatibility risks, and API contract violations.
